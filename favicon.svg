<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="円">
  <!-- 小サイズ重視: グラデなし、コントラスト高、￥は面＋太ストローで大きく -->
  <rect width="64" height="64" rx="13" fill="#0d5bd4" />
  <g>
    <!-- 人字形（下で交わる太い斜め）: 下に行くほど記号面積が大きくなり、タブで判別しやすい -->
    <path
      d="M11 7 L32 40 L53 7"
      fill="none"
      stroke="#ffffff"
      stroke-width="7.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- 2本の横棒は長方形で面を取り、拡大縮小でも形が潰れにくい（斜線の上に重ねる） -->
    <rect x="4" y="22" width="56" height="5.5" rx="2.5" fill="#ffffff" />
    <rect x="4" y="30.5" width="56" height="5.5" rx="2.5" fill="#ffffff" />
  </g>
</svg>
